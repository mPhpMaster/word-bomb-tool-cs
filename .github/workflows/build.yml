name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    # WPF + the Win32 hotkey/SendInput code require a Windows runner.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\WordBombTool.sln

      - name: Build (Release)
        run: dotnet build .\WordBombTool.sln -c Release --no-restore

      - name: Test
        run: dotnet test .\src\WordBombTool.Tests\WordBombTool.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"
